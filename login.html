<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Go Easy Travels</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #cbd5e1, #f1f5f9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header i {
            font-size: 2.5rem;
            color: #1a8faa;
            margin-bottom: 0.5rem;
        }

        .auth-header h2 {
            font-size: 1.75rem;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1a8faa;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(95deg, #e67e22, #f39c12);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #1a8faa;
            text-decoration: none;
        }

        .demo-info {
            background: #e0f2fe;
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }

        .demo-info p {
            margin: 0.25rem 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-plane-departure"></i>
            <h2>Welcome Back</h2>
            <p>Login to your Go Easy account</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        
        <div class="demo-info">
            <p><strong>📋 Demo Access:</strong></p>
            <p>👑 Super Admin: admin@gmail.com (any password)</p>
            <p>👤 Admin: john@goeasy.com (any password)</p>
            <p>🔧 Moderator: sarah@goeasy.com (any password)</p>
            <p>👥 Regular User: any other email</p>
        </div>
        
        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                alert('Please enter both email and password');
                return;
            }
            
            // Get admins from localStorage
            const admins = JSON.parse(localStorage.getItem('goeasy_admins') || '[]');
            const foundAdmin = admins.find(a => a.email === email);
            
            // Store user info
            localStorage.setItem('goeasy_user_email', email);
            localStorage.setItem('goeasy_user_name', email.split('@')[0]);
            
            if (foundAdmin) {
                // This is an admin user
                const userData = {
                    email: foundAdmin.email,
                    name: foundAdmin.name,
                    role: foundAdmin.role,
                    id: foundAdmin.id
                };
                localStorage.setItem('goeasy_user', JSON.stringify(userData));
                localStorage.setItem('goeasy_user_role', foundAdmin.role);
                window.location.href = 'dashboard/admin-dashboard.html';
            } else if (email === 'admin@gmail.com') {
                // Legacy super admin
                const userData = {
                    email: email,
                    name: 'Super Admin',
                    role: 'super_admin',
                    id: 1
                };
                localStorage.setItem('goeasy_user', JSON.stringify(userData));
                localStorage.setItem('goeasy_user_role', 'super_admin');
                window.location.href = 'dashboard/admin-dashboard.html';
            } else {
                // Regular user
                const userData = {
                    email: email,
                    name: email.split('@')[0],
                    role: 'user',
                    id: Date.now()
                };
                localStorage.setItem('goeasy_user', JSON.stringify(userData));
                localStorage.setItem('goeasy_user_role', 'user');
                window.location.href = 'dashboard/user-dashboard.html';
            }
        });
    </script>
</body>
</html>
